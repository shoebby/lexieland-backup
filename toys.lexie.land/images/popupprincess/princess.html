<!DOCTYPE html>
<head>
    <style>
        body {
            overflow: hidden;
            background-image: repeating-radial-gradient(circle at top left, #ff7df4 0%, #8ad4ff 4%, #8ad4ff 5%, #ff7df4 9%);
            background-repeat: repeat;
        }
        .princess {
            height: 100vh;
            animation: spincess 2s infinite linear;
        }
        @keyframes spincess {
            0% { transform: rotateY(0deg); }
            50% { transform: rotateY(180deg); }
            100% { transform: rotateY(360deg); }
        }
    </style>
</head>
<body>
    <img src="princess.png" class="princess">
</body>
