<!DOCTYPE html>
<HTML>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="sprout/sprout.css">
        <style>
            .branch {
                animation: spin 30s linear infinite;
                height: var(--w);
                width: var(--h);
                border-radius: 999px;
                mix-blend-mode: normal;
                color: hsl(0, 100%, 67%);
            }
            .root {
                position: absolute;
                left: 50vw;
                top: 50vh;
            }
            @keyframes spin {
                0% {
                    rotate: 0deg;
                    scale: 100%;
                }
                50% {
                    rotate: 360deg;
                    scale: 200%;
                }
                100% {
                    rotate: 720deg;
                    scale: 100%;
                }
            }
        </style>
    </head>
    <body>
        <script>
            const depth = 6;
            const ratio = 0.75;
            const startLength = 100;
            const angleLeft = 45;
            const angleRight = 45;

            function initTrees(treeAmount) {
                var startAngle = 360 / treeAmount;
                for (i = 0; i < treeAmount; i++) {
                    tree(startLength, startAngle*i, depth, null, null, ratio);
                }
            }

            function getRandomIntInclusive(min, max) {
                const minCeiled = Math.ceil(min);
                const maxFloored = Math.floor(max);
                return Math.floor(Math.random() * (maxFloored - minCeiled + 1) + minCeiled); // The maximum is exclusive and the minimum is inclusive
            }

            function randomColour() {
                let clr_h = getRandomIntInclusive(0,360);
                let clr_s = getRandomIntInclusive(90,100);
                let clr_l = getRandomIntInclusive(75,90);
                let genColour = `hsl(${clr_h}deg, ${clr_s}%, ${clr_l}%)`;
                return genColour;
            }

            function tree(startLength, startRot, depth, parent, angle, ratio) {
                if (depth == 0) {
                    return;
                }

                const newBranch = document.createElement("div");
                newBranch.classList.add("branch");
                newBranch.setAttribute("id", "treeBranch");                
                
                if (parent != null) {
                    parent.appendChild(newBranch);

                    newBranch.style.setProperty('--h', parent.offsetWidth * ratio + "px");
                    newBranch.style.setProperty('--w', parent.offsetWidth * ratio + "px");
                    newBranch.style.setProperty('--a', angle + "deg");

                } else if (parent == null) {
                    newBranch.classList.add("root");
                    document.body.appendChild(newBranch);

                    newBranch.style.setProperty('--h', startLength + "px");
                    newBranch.style.setProperty('--w', startLength + "px");
                    newBranch.style.setProperty('--a', startRot + "deg");
                }
                newBranch.style.setProperty('background', randomColour());

                tree(startLength, startRot, depth - 1, newBranch, angleLeft, ratio);
                tree(startLength, startRot, depth - 1, newBranch, -angleRight, ratio);
            }

            initTrees(3);
        </script>
    <body>
