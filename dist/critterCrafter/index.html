<!DOCTYPE HTML>
<html>
<head>
	<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title id="title">Critter Crafter</title>
    <meta name="description" content="Craft your very own critter and dress it up!">
    <link rel="icon" type="image/x-icon" href="../images/favicon.ico">

	<link id="main-css" rel="stylesheet" type="text/css" href="styles/mainstylesheet.css" charset="utf-8">
	<link id="colors-css" rel="stylesheet" type="text/css" href="styles/colors.css" charset="utf-8">

	<script type="text/javascript" src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
	<script type="text/javascript" src="https://code.jquery.com/ui/1.14.1/jquery-ui.min.js" integrity="sha256-AlTido85uXPlSyyaZNsjJXeCs07eSv3r43kyCVc8ChI=" crossorigin="anonymous"></script>
	<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@rwap/jquery-ui-touch-punch@1.1.5/jquery.ui.touch-punch.min.js" crossorigin="anonymous"></script>
	<script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js" crossorigin="anonymous"></script>
	<script type="text/javascript" src="https://cdn.jsdelivr.net/gh/lottev1991/html2canvas@1.6.5-custom/dist/html2canvas.min.js" crossorigin="anonymous"></script>
	<script type="text/javascript" src="scripts/drag.js"></script>
</head>
<body>
	<h1 id="page-header">Critter Crafter</h1>
	<h2 id="page-subheader">Craft your very own critter and dress it up!</a></h2>

	<div id="dollmaker_container">
		<div id="bodyArea" class="ui-corner-all" title="Make your doll here.">
			<img id="Doll-background" class="clickable">
			<div id="avi-area"></div>
		</div>

		<div id="swatchesArea" class="ui-corner-all">
			<button id="downloadDoll" alt="Click here to download your finished doll." title="Click here to download your finished doll.">Download Critter</button>
			<button id="reset" alt="Click here to reset the dollmaker to its default settings."
				title="Click here to reset the dollmaker to its default settings.">Reset</button>

			<div id="Skintone-switch" class="switcher">
				<h3>Skintone:</h3>
				<a href="base/Skintone/full/01Skin.png">
					<img src="base/Skintone/thumbnails/01Skin.png">
				</a>
				<a href="base/Skintone/full/02Skin.png">
					<img src="base/Skintone/thumbnails/02Skin.png">
				</a>
				<a href="base/Skintone/full/03Skin.png">
					<img src="base/Skintone/thumbnails/03Skin.png">
				</a>				
			</div>
		</div>

		<div id="piecesArea" alt="You can drag pieces from this area." title="You can drag pieces from this area.">
			<ul id="tabsbar">
				<li><a href="#tabs-1">Hair</a></li>
				<li><a href="#tabs-2">Face</a></li>
				<li><a href="#tabs-3">Tops</a></li>
				<li><a href="#tabs-4">Bottoms</a></li>
			</ul>

			<div id="tabs-1">
							<img alt="" src="images/1Hair/placeholder1.png">
							<img alt="" src="images/1Hair/placeholder2.png">
							<img alt="" src="images/1Hair/placeholder3.png">
			</div>

			<div id="tabs-2">
							<img alt="" src="images/2Face/placeholder1.png">
							<img alt="" src="images/2Face/placeholder2.png">
							<img alt="" src="images/2Face/placeholder3.png">
							<img alt="" src="images/2Face/placeholder4.png">
							<img alt="" src="images/2Face/placeholder5.png">
			</div>
			<div id="tabs-3">
							<img alt="" src="images/3Tops/placeholder1.png">
							<img alt="" src="images/3Tops/placeholder2.png">
							<img alt="" src="images/3Tops/placeholder3.png">
			</div>
			<div id="tabs-4">
							<img alt="" src="images/4Skirts/placeholder1.png">
							<img alt="" src="images/4Skirts/placeholder2.png">
							<img alt="" src="images/4Skirts/placeholder3.png">
			</div>


		</div>
	</div>
	<footer style="position: absolute; bottom: 2vh; width: 99%; text-align: center;">
		Cloned, Torn Apart, and Reconstituted from <a href="https://github.com/malakhims/Dollmaker-Template/tree/v1.0.0">Malakhim's Dollmaker Template</a>
	</footer>
</body>
</html>
