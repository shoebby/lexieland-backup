<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Pop-Up Collage Maker</title>
    <meta name="description" content="Make collages of pop-ups!">
    <link rel="icon" type="image/x-icon" href="images/favicon.ico">
    <script type="module" src="popupcollager.js"></script>
    <link rel="stylesheet" href="popupcollager.css">
</head>
<body>
    <h1>Pop-Up Collage Maker</h1>
    <p>
        Make collages out of pop-up windows, specifying the things to which they link, their sizes, and screen positions!<br>
        For an example of what's possible <a href="./popupprincess.html">Click Here!</a>
    </p>
    <input type="button" value="Generate" target="GenerateCollage">
    <p>
        Amount of popups: <input type="number" value="1" target="PopupNum" min="1">
    </p>
    <div class="popupController" id="popupController">
        <p>Link: <input type="text" value="https://www.lexie.land/dist/index.html" target="pu1_l"></p>
        <p>Inject HTML: <input type="text" value='<div>Cool Beans!</div>' target='pu1_html'></p>
        <p>All following values are in px:</p>
        <p>ScreenX: <input type="number" value="0" target="pu1_sX"></p>
        <p>ScreenY: <input type="number" value="0" target="pu1_sY"></p>
        <p>Width: <input type="number" value="500" target="pu1_w"></p>
        <p>Height: <input type="number" value="500" target="pu1_h"></p>
    </div>
</body>
