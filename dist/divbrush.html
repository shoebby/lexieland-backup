<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LexieLand - DivBrush</title>
    <meta name="description" content="Draw divs with your cursor!">
    <link rel="icon" type="image/x-icon" href="images/favicon.ico">
    <link rel="stylesheet" href="divbrush.css">
    <script src="divbrush.js" type="module"></script>
</head>
<body>
    <div id="toolbar">
        <details>
            <summary>Dimensions (in px)</summary>
            <div class="tool-content">
                <label for="width">Width: </label>
                <input id="width" type="number" value="2">
                <br>
                <label for="height">Height: </label>
                <input id="height" type="number" value="2">
            </div>
        </details>

        <details>
            <summary>Background</summary>

            <div class="tool-content">
                <textarea id="background" cols="40" rows="5">black</textarea>
            </div>
        </details>

        <details>
            <summary>Border</summary>

            <div class="tool-content">
                <textarea id="border" cols="40" rows="1">1px solid black</textarea>
            </div>
        </details>

        <details>
            <summary>Border Radius</summary>

            <div class="tool-content">
                <input id="borderRadius" type="number" value="0">
            </div>
        </details>
    </div>
</body>
