<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LexieLand - DivBrush</title>
    <meta name="description" content="Draw divs with your cursor!">
    <link rel="icon" type="image/x-icon" href="images/favicon.ico">
    <link rel="stylesheet" href="divbrush.css">
    <script src="divbrush.js" type="module"></script>
</head>
<body>
    <div id="canvas"></div>
    <div id="toolbar">
        <details>
            <summary>Dimensions (in px)</summary>
            <div class="tool-content">
                <label for="width">Width: </label>
                <input id="width" type="number" value="2">
                <br>
                <label for="height">Height: </label>
                <input id="height" type="number" value="2">
            </div>
        </details>

        <details>
            <summary>Background</summary>

            <div class="tool-content">
                <textarea id="background" cols="40" rows="2">black</textarea>
            </div>
        </details>

        <details>
            <summary>Border</summary>

            <div class="tool-content">
                <label for="borderL">Left</label>
                <textarea id="borderL" cols="40" rows="1">1px solid black</textarea>
                <br>
                <label for="borderR">Right</label>
                <textarea id="borderR" cols="40" rows="1">1px solid black</textarea>
                <br>
                <label for="borderT">Top</label>
                <textarea id="borderT" cols="40" rows="1">1px solid black</textarea>
                <br>
                <label for="borderB">Bottom</label>
                <textarea id="borderB" cols="40" rows="1">1px solid black</textarea>
            </div>
        </details>

        <details>
            <summary>Border Radius</summary>

            <div class="tool-content">
                <input id="borderRadius" type="number" value="0">
            </div>
        </details>

        <details>
            <summary>Animation</summary>

            <div class="tool-content">
                <label for="animation_rot">Rotating: </label>
                <textarea id="animation_rot" cols="40" rows="1">360</textarea>

                <label for="animSettings">Animation Settings: </label>
                <textarea id="animSettings" cols="40" rows="1">infinite 2s linear</textarea>
            </div>
        </details>
    </div>
</body>
