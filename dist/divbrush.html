<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LexieLand - DivBrush</title>
    <meta name="description" content="Draw divs with your cursor!">
    <link rel="icon" type="image/x-icon" href="images/favicon.ico">
    <link rel="stylesheet" href="divbrush.css">
    <script src="divbrush.js" type="module"></script>
</head>
<body>
    <div id="divBrush_bootOverlay">
        <div class="title">
            <div style="color: white;">Div</div>
            <div class="t_b">B</div>
            <div class="t_r">R</div>
            <div class="t_u">U</div>
            <div class="t_s">S</div>
            <div class="t_h">H</div>
        </div>
        <button target="closeOverlay">start drawing!</button>
    </div>
    <div id="canvas"></div>
    <div id="toolbar">
        <div class="preview">
            <div class="peviewBrush"></div>
        </div>
        <details>
            <summary>Dimensions (in px)</summary>
            <div class="tool-content">
                <label for="width">Width: </label>
                <input id="width" type="number" value="25">
                <br>
                <label for="height">Height: </label>
                <input id="height" type="number" value="25">
            </div>
        </details>

        <details>
            <summary>Background</summary>

            <div class="tool-content">
                <textarea id="background" cols="40" rows="2">black</textarea>
            </div>
        </details>

        <details>
            <summary>Border</summary>

            <div class="tool-content">
                <label for="borderL">Left</label>
                <textarea id="borderL" cols="40" rows="1">2px solid orangered</textarea>
                <br>
                <label for="borderR">Right</label>
                <textarea id="borderR" cols="40" rows="1">2px solid orangered</textarea>
                <br>
                <label for="borderT">Top</label>
                <textarea id="borderT" cols="40" rows="1">0px solid black</textarea>
                <br>
                <label for="borderB">Bottom</label>
                <textarea id="borderB" cols="40" rows="1">0px solid black</textarea>
            </div>
        </details>

        <details>
            <summary>Border Radius</summary>

            <div class="tool-content">
                <input id="borderRadius" type="number" value="0">
            </div>
        </details>

        <details>
            <summary>Animation</summary>

            <div class="tool-content">
                <label for="animation">Rotating: </label>
                <textarea id="animation" cols="40" rows="3">0%{rotate:0deg;transform:scale(1);background:black}50%{transform:scale(2.5);background:white}100%{rotate:360deg;transform:scale(1);background:black}</textarea>
                <label for="animSettings">Animation Settings: </label>
                <textarea id="animSettings" cols="40" rows="1">infinite 2s linear</textarea>
            </div>
        </details>
    </div>
    <script>
            const audio = new Audio("./sounds/webtoys/divbrush.mp3");
            audio.play();

            const title = document.querySelector(".title");
            const title_b = document.querySelector(".t_b");
            const title_r = document.querySelector(".t_r");
            const title_u = document.querySelector(".t_u");
            const title_s = document.querySelector(".t_s");
            const title_h = document.querySelector(".t_h");
            const playbtn = document.querySelector("button[target='closeOverlay']");

            title_b.style.setProperty("display", "none");
            title_r.style.setProperty("display", "none");
            title_u.style.setProperty("display", "none");
            title_s.style.setProperty("display", "none");
            title_h.style.setProperty("display", "none");
            playbtn.style.setProperty("display", "none");

            setTimeout(() => {
                title.style.setProperty("rotate", "-35deg");
            }, 0);
            setTimeout(() => {
                title.style.setProperty("rotate", "35deg");
            }, 200);
            setTimeout(() => {
                title.style.setProperty("rotate", "0deg");
                title_b.style.setProperty("display", "inline-block");
            }, 350);
            setTimeout(() => {
                title_r.style.setProperty("display", "inline-block");
            }, 550);
            setTimeout(() => {
                title_u.style.setProperty("display", "inline-block");
            }, 750);
            setTimeout(() => {
                title_s.style.setProperty("display", "inline-block");
            }, 950);
            setTimeout(() => {
                title_h.style.setProperty("display", "inline-block");
                title.style.setProperty("transition", "3s");
                title.style.setProperty("transform", "scale(1.2)");
                playbtn.style.setProperty("display", "block");
            }, 1150);
    </script>
</body>
