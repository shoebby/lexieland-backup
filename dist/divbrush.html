<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LexieLand - DivBrush</title>
    <meta name="description" content="Draw divs with your cursor!">
    <link rel="icon" type="image/x-icon" href="images/favicon.ico">
    <link rel="stylesheet" href="divbrush.css">
    <script src="divbrush.js" type="module"></script>
</head>
<body>
    <div style="width: 10vw;">
        <fieldset>
            <legend>Dimensions (in px)</legend>

            <label for="width">Width: </label>
            <input id="width" type="number" value="2">

            <label for="height">Height: </label>
            <input id="height" type="number" value="2">
        </fieldset>

        <fieldset>
            <legend>Background Fill</legend>

            <label for="background">Background: </label>
            <textarea id="background" cols="40" rows="5">black</textarea>
        </fieldset>
    </div>
</body>
