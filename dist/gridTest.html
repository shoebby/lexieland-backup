<!DOCTYPE html>
<head>
    <style>
        html, body {
            padding: 0;
            margin: 0;
            overflow: hidden;
        }
        .container {
            width: 80vw;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 50% 25% 12.5% 12.5%;
            grid-template-rows: 50px 100px 25px 25px;
        }
        .item {
            display: flex;
            justify-content: center;
            align-items: center;

            width: 100%;
            height: 100%;
        }
        .sub-item {
            display: flex;
            justify-content: center;
            align-items: center;
            
            width: 100%;
            height: 100%;
        }
        .a {
            display: grid;
            grid-template-columns: 50% 50%;
            grid-template-rows: 100%;

            background-color: red;
            grid-column-start: 1;
            grid-column-end: 3;
            grid-row-start: 1;
            grid-row-end: 3;
        }
        .a-1 {
            background: repeating-radial-gradient(circle at center, red 0%, black 4%);
            color: white;
        }
        .a-2 {
            background: repeating-radial-gradient(circle at center, red 0%, white 4%);
            color: black;
        }
        .b {
            background-color: lime;
            grid-column-start: 2;
            grid-column-end: 5;
            grid-row-start: 3;
            grid-row-end: 5;
        }
        .c {
            background-color: yellow;
            grid-column-start: 3;
            grid-column-end: 5;
            grid-row-start: 1;
            grid-row-end: 3;
        }
        .d {
            background-color: cyan;
            grid-column-start: 1;
            grid-column-end: 2;
            grid-row-start: 3;
            grid-row-end: 5;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="item a">
            <div class="sub-item a-1"><p>A::1</p></div>
            <div class="sub-item a-2"><p>A::2</p></div>
        </div>
        <div class="item b">
            <p>B</p>
        </div>
        <div class="item c">
            <p>C</p>
        </div>
        <div class="item d">
            <p>D</p>
        </div>
    </div>
</body>
